<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width"/>
        <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <title>Oahu Restaurants</title>
    </head>
    <body>
        <header class="double-navbar">
            <!-- Home & About Navbar -->
            <nav class='top-nav' style="background-color: #faf4e8;">
                <div class="container d-flex justify-content-end">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">About</a>
                </div>
            </nav>

            <!-- Model Navbar -->
            <nav class="main-nav">
                <div class="d-flex justify-content-center align-items-center" style="height: 50px; text-align: center; background-color: #ffb74a";>
                    <a href="#" class="model-link mx-4">Restaurants</a>
                    <a href="#" class="model-link mx-4">Reviews</a>
                    <a href="#" class="model-link mx-4">Preferences</a>
                </div>
            </nav>
        </header>

        <!-- Hero Image + Website Name -->
        <div class="card text-bg-dark border-0">
            <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2c/b8/8e/c4/wedding.jpg" class="card-img opacity-25" style="height: 500px; object-fit: cover;" alt="Hero Image">
            <div class="card-img-overlay d-flex flex-column justify-content-center align-items-center">
                <h1 class="card-title display-2" style="color:black">WEBSITE NAME</h1>
            </div>

        <!-- Where We Explain Our Website -->
        <p class="px-3 py-3">Description of website.</p>
