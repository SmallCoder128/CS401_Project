<!doctype html>
<html lang="en-US">
    <head>
        <link href="{{ url_for('static', filename='styles/style.css') }}" rel="stylesheet" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <title>Oʻahu Restaurant Finder | Restaurants</title>

        <style>
            .select-location{
                margin-left: 2px;
            }
        </style>

        </head>
    <body> 

        {% include 'navbar.html' %}

        <div class="px-5 pt-5 pb-3">  
            <h1 class="restaurant-title">Restaurant Finder</h1>
            
            <!-- Select Menu -->
            <div>
                <label for="locators">Select a location:</label>

                <select name="locators" id = "locators" class="select-location">
                    {% for locator in locators %}
                        <option value="{{ locator }}" {% if locator == selected_place %}selected{% endif %}>
                            {{ locator }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!--<div class="table-container">
                {% if tables %}
                    {% for table in tables %}
                        {{ table|safe }}
                    {% endfor %}
                {% endif %}
            </div>-->
        </div>

        <!-- Cards -->
        <div class="container-fluid px-5 pt-3 pb-5">
            <div class="row g-4">
                {% for r in restaurants %}
                <div class="col-md-4">
                    <a href="{{ url_for('restaurant_detail', name=r.name)}}" 
                        class="restaurant-link" target="_blank">
                        <div class="card h-100 shadow-sm">
                            <img src="{{r.image_url}}" class="card-img-top" alt="Restaurant Image" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h4 class="card-title">{{ r.name }}</h4>
                                <p class="card-text mb-1">
                                    <strong>Location:</strong> {{ r.locator }}
                                </p>
                                <p class="card-text mb-1">
                                    <strong>Address:</strong> {{ r.location.get('display_address', 'N/A') | join(', ') }}
                                </p>
                            </div>
                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        {% include 'footer.html' %}

    </body>
    <script>

    // Javascript to change the page when a dropdown item is selected
    const selectElement = document.getElementById('locators');
   
    async function updatetable() {
        const selectedValue = selectElement.value;
        window.location.href = `/restaurants?place=${selectedValue}`;
        // Update the table with the new data
    }
    selectElement.addEventListener('change', updatetable);
    </script>
</html>
